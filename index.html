<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25:00 — Механический Flip Таймер</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a0000;
      color: white;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h2 {
      color: #ff3366;
      margin-bottom: 30px;
      font-size: 32px;
    }

    .flip-clock {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .digit {
      position: relative;
      width: 130px;
      height: 180px;
      perspective: 1200px;
    }

    .flip-card {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .digit.flipping .flip-card {
      transform: rotateX(-180deg);
    }

    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
      font-weight: 900;
      backface-visibility: hidden;
      box-shadow: 0 15px 25px rgba(0,0,0,0.7);
      border: 4px solid #660011;
    }

    .front {
      background: linear-gradient(#ff1a4d, #e6003d);
      color: white;
      z-index: 2;
    }

    .back {
      background: linear-gradient(#cc0033, #990022);
      color: white;
      transform: rotateX(180deg);
    }

    /* Верхняя и нижняя тени для эффекта "половинок" */
    .front::before, .back::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 4px;
      background: rgba(0,0,0,0.6);
      z-index: 3;
    }

    .separator {
      font-size: 110px;
      color: #ff3366;
      font-weight: bold;
      margin-top: -30px;
    }

    .label {
      font-size: 18px;
      color: #ff99aa;
      margin-top: 12px;
      letter-spacing: 2px;
    }

    button {
      margin-top: 50px;
      padding: 16px 40px;
      font-size: 20px;
      border: none;
      border-radius: 50px;
      background: #ff3366;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #ff1a4d; }
  </style>
</head>
<body>
  <h2>🔥 Механический Листовой Таймер</h2>

  <div class="flip-clock">
    <!-- Минуты -->
    <div>
      <div class="digit" id="min-tens">
        <div class="flip-card">
          <div class="front" id="min-tens-front">2</div>
          <div class="back" id="min-tens-back">2</div>
        </div>
      </div>
      <div class="digit" id="min-ones">
        <div class="flip-card">
          <div class="front" id="min-ones-front">5</div>
          <div class="back" id="min-ones-back">5</div>
        </div>
      </div>
      <div class="label">МИНУТЫ</div>
    </div>

    <div class="separator">:</div>

    <!-- Секунды -->
    <div>
      <div class="digit" id="sec-tens">
        <div class="flip-card">
          <div class="front" id="sec-tens-front">0</div>
          <div class="back" id="sec-tens-back">0</div>
        </div>
      </div>
      <div class="digit" id="sec-ones">
        <div class="flip-card">
          <div class="front" id="sec-ones-front">0</div>
          <div class="back" id="sec-ones-back">0</div>
        </div>
      </div>
      <div class="label">СЕКУНДЫ</div>
    </div>
  </div>

  <div>
    <button onclick="startTimer()">▶ Старт</button>
    <button onclick="pauseTimer()">⏸ Пауза</button>
    <button onclick="resetTimer()">↺ Сброс</button>
  </div>

  <script>
    let timeLeft = 25 * 60;
    let timerId = null;
    let isRunning = false;

    function updateDigit(groupId, newValue) {
      const digit = document.getElementById(groupId);
      const front = document.getElementById(groupId + '-front');
      const back = document.getElementById(groupId + '-back');

      if (front.textContent === newValue) return;

      back.textContent = newValue;
      digit.classList.add('flipping');

      setTimeout(() => {
        front.textContent = newValue;
        digit.classList.remove('flipping');
      }, 800);
    }

    function updateDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      updateDigit('min-tens', Math.floor(minutes / 10).toString());
      updateDigit('min-ones', (minutes % 10).toString());
      updateDigit('sec-tens', Math.floor(seconds / 10).toString());
      updateDigit('sec-ones', (seconds % 10).toString());
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      timerId = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          isRunning = false;
          alert("🎉 Таймер завершён! Отличная сессия! 🔥");
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerId);
      isRunning = false;
    }

    function resetTimer() {
      pauseTimer();
      timeLeft = 25 * 60;
      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
