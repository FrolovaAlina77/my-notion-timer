<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Flip Countdown Timer with Controls</title>
  <style>
    /* НАСТРОЙКА РАЗМЕРА: меняйте этот коэффициент (1 — базовый размер, 1.5 — крупнее, 0.7 — меньше) */
    :root {
      --clock-scale: 1.2; 
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent; /* Прозрачный фон для интеграции в Notion */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Главный контейнер для часов и кнопки */
    .widget-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: calc(24px * var(--clock-scale));
      transform: scale(var(--clock-scale));
      transform-origin: center;
    }

    /* Контейнер таймера */
    .timer-container {
      display: flex;
      gap: 20px;
    }

    /* Группа для минут / секунд */
    .flip-group {
      display: flex;
      gap: 4px;
    }

    /* Конструкция одной цифры */
    .flip-card {
      position: relative;
      width: 60px;
      height: 90px;
      font-size: 70px;
      font-weight: 700;
      line-height: 90px;
      color: #ffffff;
      background: #1e1e1e;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      perspective: 200px;
    }

    /* Половинки карточки */
    .top, .bottom, .flip-top, .flip-bottom {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      text-align: center;
      background: #222;
    }

    .top, .flip-top {
      top: 0;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.4);
    }

    .bottom, .flip-bottom {
      bottom: 0;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      line-height: 0;
    }

    /* Коррекция положения цифр в половинках */
    .top-text, .flip-top-text {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .bottom-text, .flip-bottom-text {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Анимационные слои */
    .flip-top {
      transform-origin: bottom;
      z-index: 3;
    }

    .flip-bottom {
      transform-origin: top;
      transform: rotateX(90deg);
      z-index: 2;
    }

    /* Стили анимации переворота */
    .animate .flip-top {
      animation: flipTop 0.3s ease-in forwards;
    }

    .animate .flip-bottom {
      animation: flipBottom 0.3s ease-out 0.3s forwards;
    }

    @keyframes flipTop {
      100% { transform: rotateX(-90deg); }
    }

    @keyframes flipBottom {
      100% { transform: rotateX(0deg); }
    }

    /* Стили для кнопки управления */
    .control-btn {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      padding: 8px 24px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
      outline: none;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }

    .control-btn:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="widget-wrap">
    <div class="timer-container">
      <!-- Минуты -->
      <div class="flip-group">
        <div class="flip-card" id="m1">
          <div class="top"><div class="top-text">2</div></div>
          <div class="bottom"><div class="bottom-text">2</div></div>
          <div class="flip-top"><div class="flip-top-text">2</div></div>
          <div class="flip-bottom"><div class="flip-bottom-text">2</div></div>
        </div>
        <div class="flip-card" id="m2">
          <div class="top"><div class="top-text">5</div></div>
          <div class="bottom"><div class="bottom-text">5</div></div>
          <div class="flip-top"><div class="flip-top-text">5</div></div>
          <div class="flip-bottom"><div class="flip-bottom-text">5</div></div>
        </div>
      </div>

      <!-- Секунды -->
      <div class="flip-group">
        <div class="flip-card" id="s1">
          <div class="top"><div class="top-text">0</div></div>
          <div class="bottom"><div class="bottom-text">0</div></div>
          <div class="flip-top"><div class="flip-top-text">0</div></div>
          <div class="flip-bottom"><div class="flip-bottom-text">0</div></div>
        </div>
        <div class="flip-card" id="s2">
          <div class="top"><div class="top-text">0</div></div>
          <div class="bottom"><div class="bottom-text">0</div></div>
          <div class="flip-top"><div class="flip-top-text">0</div></div>
          <div class="flip-bottom"><div class="flip-bottom-text">0</div></div>
        </div>
      </div>
    </div>

    <!-- Кнопка Play/Pause -->
    <button class="control-btn" id="toggleBtn">Пауза</button>
  </div>

  <script>
    // Настройки времени (25 минут)
    let timeLeft = 25 * 60;
    let timerInterval = null;
    let isRunning = true; // По умолчанию таймер запускается сразу

    const toggleBtn = document.getElementById('toggleBtn');

    function updateCard(cardId, newValue) {
      const card = document.getElementById(cardId);
      const topText = card.querySelector('.top-text');
      const bottomText = card.querySelector('.bottom-text');
      const flipTopText = card.querySelector('.flip-top-text');
      const flipBottomText = card.querySelector('.flip-bottom-text');

      if (topText.textContent === newValue) return;

      flipTopText.textContent = topText.textContent;
      flipBottomText.textContent = newValue;
      topText.textContent = newValue;

      card.classList.add('animate');

      setTimeout(() => {
        bottomText.textContent = newValue;
        card.classList.remove('animate');
      }, 600);
    }

    function updateTimerDisplay() {
      if (timeLeft < 0) {
        clearInterval(timerInterval);
        toggleBtn.textContent = "Готово";
        toggleBtn.disabled = true;
        isRunning = false;
        return;
      }

      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      const mStr = String(minutes).padStart(2, '0');
      const sStr = String(seconds).padStart(2, '0');

      updateCard('m1', mStr[0]);
      updateCard('m2', mStr[1]);
      updateCard('s1', sStr[0]);
      updateCard('s2', sStr[1]);
    }

    function tick() {
      if (timeLeft > 0) {
        timeLeft--;
        updateTimerDisplay();
      } else {
        updateTimerDisplay();
      }
    }

    function startTimer() {
      timerInterval = setInterval(tick, 1000);
      toggleBtn.textContent = "Пауза";
      isRunning = true;
    }

    function pauseTimer() {
      clearInterval(timerInterval);
      toggleBtn.textContent = "Старт";
      isRunning = false;
    }

    // Обработчик клика на кнопку
    toggleBtn.addEventListener('click', () => {
      if (timeLeft <= 0) return;
      
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    // Инициализация при старте
    updateTimerDisplay();
    startTimer();
  </script>
</body>
</html>
